<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3584e4"/>
      <stop offset="1" stop-color="#1c5dc7"/>
    </linearGradient>
    <linearGradient id="film" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#deddda"/>
    </linearGradient>
  </defs>
  <!-- rounded background -->
  <rect x="8" y="8" width="240" height="240" rx="48" ry="48" fill="url(#bg)"/>
  <!-- film strip top -->
  <g fill="url(#film)">
    <rect x="36" y="40" width="184" height="36" rx="6"/>
  </g>
  <!-- sprocket holes top -->
  <g fill="#3584e4">
    <rect x="46" y="48" width="14" height="20" rx="2"/>
    <rect x="74" y="48" width="14" height="20" rx="2"/>
    <rect x="102" y="48" width="14" height="20" rx="2"/>
    <rect x="130" y="48" width="14" height="20" rx="2"/>
    <rect x="158" y="48" width="14" height="20" rx="2"/>
    <rect x="186" y="48" width="14" height="20" rx="2"/>
  </g>
  <!-- film strip bottom -->
  <g fill="url(#film)">
    <rect x="36" y="180" width="184" height="36" rx="6"/>
  </g>
  <g fill="#3584e4">
    <rect x="46" y="188" width="14" height="20" rx="2"/>
    <rect x="74" y="188" width="14" height="20" rx="2"/>
    <rect x="102" y="188" width="14" height="20" rx="2"/>
    <rect x="130" y="188" width="14" height="20" rx="2"/>
    <rect x="158" y="188" width="14" height="20" rx="2"/>
    <rect x="186" y="188" width="14" height="20" rx="2"/>
  </g>
  <!-- download arrow -->
  <g fill="#ffffff">
    <path d="M128 100 L128 168 M104 144 L128 168 L152 144"
          stroke="#ffffff" stroke-width="20" stroke-linecap="round"
          stroke-linejoin="round" fill="none"/>
  </g>
</svg>
